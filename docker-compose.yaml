services:
  # Nginx Reverse Proxy
  # 외부 포트 80을 통해 웹 트래픽을 입력받아 내부 애플리케이션 및 모니터링 시스템으로 포워딩하는 서비스입니다.
  nginx:
    image: nginx:alpine
    container_name: mopl-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src/main/resources/static:/usr/share/nginx/html:ro
    depends_on:
      - app
      - prometheus
      - grafana
    networks:
      - mopl-network

  # Spring Boot Application Server
  # mopl 프로젝트의 핵심 API 서버로, 컨테이너 외부로 포트를 직접 노출하지 않고 내부 가상 네트워크로만 통신합니다.
  app:
    image: mopl:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mopl-server
    environment:
      - SERVER_PORT=80
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      # postgres
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      # aws
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_S3_PRESIGNED_URL_EXPIRATION=${AWS_S3_PRESIGNED_URL_EXPIRATION}
      # redis
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      - db
      - redis
    volumes:
      - ./.logs:/app/.logs
    networks:
      - mopl-network

  # PostgreSQL Database
  # mopl 애플리케이션의 메인 RDBMS 컨테이너로, 호스트에서 직접 접속할 수 없도록 격리된 가상 네트워크 내에 위치합니다.
  db:
    image: postgres:16-alpine
    container_name: mopl-db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - mopl-postgres-data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/init-schema.sql:ro
    networks:
      - mopl-network

  # Redis Cache & Token Store
  # 세션 정보 및 캐시 저장을 위한 인메모리 데이터 저장소입니다.
  redis:
    image: redis:alpine
    container_name: mopl-redis
    volumes:
      - mopl-redis-data:/data
    networks:
      - mopl-network

  # Apache Kafka (KRaft Mode)
  # 비동기 이벤트 스트리밍 처리를 위한 카프카 브로커 및 컨트롤러 일체형 컨테이너입니다.
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: mopl-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - mopl-kafka-data:/var/lib/kafka/data
    networks:
      - mopl-network

  # Prometheus
  # 스프링 부트 애플리케이션의 Actuator 메트릭을 수집하여 시계열 데이터베이스에 보관하는 모니터링 수집 엔진입니다.
  prometheus:
    image: prom/prometheus:latest
    container_name: mopl-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.external-url=/prometheus/'
      - '--web.route-prefix=/prometheus/'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - mopl-prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mopl-network

  # Grafana
  # 프로메테우스에서 수집된 시계열 메트릭을 시각적인 대시보드로 시각화해주는 대시보드 도구입니다.
  grafana:
    image: grafana/grafana:latest
    container_name: mopl-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - mopl-grafana-data:/var/lib/grafana
    networks:
      - mopl-network
    depends_on:
      - prometheus

volumes:
  mopl-postgres-data:
  mopl-grafana-data:
  mopl-prometheus-data:
  mopl-kafka-data:
  mopl-redis-data:

networks:
  mopl-network:
    driver: bridge
