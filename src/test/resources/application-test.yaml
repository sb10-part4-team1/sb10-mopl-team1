# ==========================================
# TEST 환경 (In-Memory H2)
# ==========================================
spring:
  config:
    activate:
      on-profile: test

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE # PostgreSQL 모드 활성화
    username: sa
    password:

  sql:
    init:
      mode: always # 매번 시작할 때 schema.sql 실행

  jpa:
    hibernate:
      ddl-auto: none # SQL 스크립트로 제어하므로 JPA 자동 생성은 끔

mopl:
  jwt:
    secret: mopl-test-only-jwt-secret-key-at-least-32-bytes
    access-token-expiration: PT1H
    refresh-token-expiration: P14D
    refresh-token-cookie:
      name: REFRESH_TOKEN
      path: /api/auth
      http-only: true
      secure: false
      same-site: Lax
  tmdb:
    api:
      token: mock-tmdb-bearer-token-for-test # 테스트 환경용 가짜 토큰 지정
      base-url: https://api.themoviedb.org/3
  sports:
    api:
      base-url: https://www.thesportsdb.com/api/v1/json/123
