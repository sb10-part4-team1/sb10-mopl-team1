language: ko-KR
early_access: false

chat:
  auto_reply: true

reviews:
  changed_files_summary: true
  sequence_diagrams: true
  collapse_walkthrough: true
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  review_details: false

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
      - "dev"

  path_instructions:
    - path: "**/*"
      instructions: |
        프로젝트: 모두의 플리(MOPL)
        대규모 트래픽이 예상되는 글로벌 콘텐츠 평점 및 큐레이션 플랫폼입니다.
        영화, 드라마, 스포츠 등 다양한 콘텐츠를 큐레이팅하고 공유하며,
        사용자 플레이리스트, 리뷰, 평점, 알림, 실시간 같이 보기 기능을 제공합니다.

        공통 리뷰 기준:
        - 엔티티를 API 응답으로 직접 노출하지 말고 DTO를 사용하세요.
        - 입력값은 Bean Validation으로 검증하세요.
        - 비즈니스 로직은 Controller가 아닌 Service에 위치해야 합니다.
        - 예외는 커스텀 예외와 GlobalExceptionHandler로 일관되게 처리하세요.
        - 연관관계는 기본 LAZY를 권장합니다.
        - N+1 쿼리 가능성을 확인하세요.
        - 관리자 기능은 ADMIN 권한 검증이 필요합니다.
        - JWT 인증/인가, 계정 잠금, 권한 변경 시 로그아웃 처리를 누락하지 마세요.
        - WebSocket, SSE, Redis, Batch 기능은 확장성과 장애 상황을 고려하세요.
        - 대규모 트래픽을 고려해 캐싱, 인덱스, 페이지네이션을 고려하세요.

    - path: "**/controller/**/*.java"
      instructions: |
        - Request DTO에는 @Valid를 적용하세요.
        - 엔티티를 직접 반환하지 말고 Response DTO를 반환하세요.
        - 인증/인가가 필요한 API의 권한 검증 누락을 확인하세요.
        - 비즈니스 로직은 Service로 위임하세요.

    - path: "**/service/**/*.java"
      instructions: |
        - 변경 작업은 @Transactional을 적용하세요.
        - 조회 전용 메서드는 @Transactional(readOnly = true)를 고려하세요.
        - 외부 API 호출은 타임아웃, 예외 처리, 재시도 정책을 고려하세요.
        - 긴 외부 I/O 작업을 트랜잭션 안에서 오래 수행하지 않도록 주의하세요.

    - path: "**/{entity,domain,model}/**/*.java"
      instructions: |
        - 연관관계는 기본 LAZY를 권장합니다.
        - createdAt, updatedAt 등 공통 필드 관리를 일관되게 처리하세요.
        - 비밀번호, 토큰 등 민감 정보가 노출되지 않도록 주의하세요.

    - path: "**/src/test/**/*.java"
      instructions: |
        - 핵심 도메인 규칙에 대한 테스트 누락을 확인하세요.
        - 인증/인가 실패 케이스를 테스트하세요.
        - 테스트 메서드명은 시나리오가 드러나게 작성하세요.

    - path: ".github/workflows/**/*.{yml,yaml}"
      instructions: |
        - 시크릿은 secrets 또는 vars로만 참조하고 평문으로 작성하지 마세요.
        - PR 생성 시 build/test가 수행되어야 합니다.
        - 액션 버전은 @latest 대신 명시적인 버전을 사용하세요.

    - path: "**/*.{gradle,gradle.kts}"
      instructions: |
        - 불필요한 의존성이 추가되지 않았는지 확인하세요.
        - 테스트와 커버리지 리포트 설정이 정상인지 확인하세요.